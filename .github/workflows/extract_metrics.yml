name: Extract ESG Metrics

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Extract a single company by symbol (e.g. AAPL). Leave blank to process all un-extracted reports.'
        required: false
        default: ''
      limit:
        description: 'Max number of reports to process'
        required: false
        default: '5'
      model:
        description: 'Extraction model'
        required: false
        default: 'claude-opus-4-8'

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Extraction
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        EXTRACT_MODEL: ${{ github.event.inputs.model || 'claude-opus-4-8' }}
      run: |
        ARGS="--limit ${{ github.event.inputs.limit || '5' }}"
        if [ -n "${{ github.event.inputs.company }}" ]; then
          ARGS="--company ${{ github.event.inputs.company }}"
        fi
        python scripts/extract_metrics.py $ARGS
