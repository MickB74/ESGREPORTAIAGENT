name: Weekly SBTi Scraper

on:
  schedule:
    # Run at 03:00 UTC every Tuesday (to separate from RE100 load)
    - cron: '0 3 * * 2'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape-sbti:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # We need pandas, openpyxl, requests, pymongo, certifi, toml (for helper)
        # Assuming requirements.txt has these, or we install explicitly
        pip install pandas openpyxl requests pymongo certifi toml streamlit

    - name: Run Scraper
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        python scripts/scrape_sbti.py
